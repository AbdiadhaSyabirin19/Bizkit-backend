openapi: 3.0.0
info:
  title: Bizkit Backend API
  version: 1.0.0
  description: API documentation for the Bizkit backend application.
servers:
  - url: http://localhost:8080/
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /api/ping:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
    head:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK

  /api/auth/login:
    post:
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful

  /api/me:
    get:
      summary: Get current authenticated user
      responses:
        '200':
          description: OK

  /api/auth/change-password:
    put:
      summary: Change password of current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK

